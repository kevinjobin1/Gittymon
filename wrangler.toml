name = "gittymon"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
account_id = "922e6dfde82a28128fb4e62ea584caa2"
compatibility_flags = ["nodejs_compat"]

# KV namespaces
kv_namespaces = [
  { binding = "LEADERBOARD", id = "ac8c8fc7a67848dfa272a3eee326d2e6" },
  { binding = "SUMMON_CACHE", id = "42733f45f6224dab8e7cfa6640aae393" }
]

# Durable Object for WebSocket multiplayer
durable_objects = { bindings = [
  { name = "GAME_SERVER", class_name = "GameServer" }
] }

# Migrations
migrations = [
  { tag = "v1", new_sqlite_classes = ["GameServer"] }
]

# ---- Production (default) ----
# Deploy with: wrangler deploy --assets dist
# URL: https://gittymon.kevin-jobin-1.workers.dev

# ---- Staging ----
[env.staging]
name = "gittymon-staging"

kv_namespaces = [
  { binding = "LEADERBOARD", id = "8a54d067f8294b05b3085910a5fa4efc" },
  { binding = "SUMMON_CACHE", id = "871713405d864325bc5e65d6d9525069" }
]

durable_objects = { bindings = [
  { name = "GAME_SERVER", class_name = "GameServer" }
] }

migrations = [
  { tag = "v1", new_sqlite_classes = ["GameServer"] }
]

[env.staging.observability]
enabled = true

[observability]
enabled = true

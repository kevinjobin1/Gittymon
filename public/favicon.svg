<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#1a1a1a" rx="4"/>
  <!-- Ears -->
  <rect x="4" y="6" width="4" height="4" fill="#7f001c" rx="1"/>
  <rect x="24" y="6" width="4" height="4" fill="#7f001c" rx="1"/>
  <!-- Inner ears -->
  <rect x="6" y="7" width="2" height="2" fill="#c41e3a"/>
  <rect x="24" y="7" width="2" height="2" fill="#c41e3a"/>
  <!-- Head -->
  <rect x="6" y="10" width="20" height="16" fill="#1a1a1a" rx="2"/>
  <!-- Face border glow -->
  <rect x="6" y="10" width="20" height="16" fill="none" stroke="#7f001c" stroke-width="0.5" rx="2"/>
  <!-- Left eye (big) -->
  <rect x="9" y="13" width="6" height="6" fill="#f1f5f9" rx="1"/>
  <rect x="11" y="14" width="3" height="4" fill="#1a1a1a"/>
  <rect x="11" y="15" width="2" height="2" fill="#7f001c"/>
  <!-- Right eye (big) -->
  <rect x="17" y="13" width="6" height="6" fill="#f1f5f9" rx="1"/>
  <rect x="18" y="14" width="3" height="4" fill="#1a1a1a"/>
  <rect x="18" height="2" width="2" y="15" fill="#7f001c"/>
  <!-- Mouth - mischievous grin -->
  <rect x="12" y="21" width="8" height="3" fill="#7f001c" rx="1"/>
  <rect x="14" y="22" width="4" height="2" fill="#f1f5f9" rx="0.5"/>
  <!-- Blush dots -->
  <rect x="7" y="19" width="2" height="1" fill="#c41e3a" opacity="0.4"/>
  <rect x="23" y="19" width="2" height="1" fill="#c41e3a" opacity="0.4"/>
</svg>
